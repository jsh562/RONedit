# Dependabot configuration — keeps the SHA-pinned GitHub Actions in
# .github/workflows/ci.yml current (OR-012 / AD-005 / SC-009).
#
# Every third-party action in ci.yml is pinned to a full commit SHA for
# supply-chain hardening. Pins go stale silently; this config opens a weekly
# PR that bumps each pin to the latest release SHA (updating the trailing
# `# vX.Y.Z` comment), so updates stay reviewable rather than implicit.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
